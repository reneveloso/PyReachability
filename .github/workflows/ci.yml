name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS bills at 10x and Windows at 2x on private repos; run them
        # only on PRs and manual dispatches, not on every push to main
        os: ${{ github.event_name == 'push' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "macos-latest", "windows-latest"]') }}
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with test extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Run Python tests
        run: pytest -v

  cpp-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure and build C++ tests
        run: |
          cmake -S . -B build-cpp -DCMAKE_BUILD_TYPE=Debug
          cmake --build build-cpp --target cpp_tests
      - name: Run C++ tests
        run: ./build-cpp/cpp_tests
